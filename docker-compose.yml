services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: digitmak
      POSTGRES_USER: digitmak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-digitmak_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitmak"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build: ./backend/src/DigitMak.Portal.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Portal: Host=postgres;Database=digitmak;Username=digitmak;Password=${POSTGRES_PASSWORD:-digitmak_dev}
    ports: ["8080:8080"]
    depends_on:
      postgres:
        condition: service_healthy
  frontend:
    build: ./frontend
    ports: ["3000:80"]
    depends_on: [api]
volumes:
  postgres_data:
